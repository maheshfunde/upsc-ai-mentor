<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC AI Mentor - PYQ Analysis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeItem='pyq')}"></div>

    <main class="main-content">
        <div class="page-header">
            <h1>PYQ Analysis</h1>
            <p>Enter a topic to get curated PYQs and model answers tailored for UPSC CSE.</p>
        </div>

        <div class="plan-section">
            <h2>Topic Selection</h2>
            <div class="form-group">
                <label for="pyqSubject">Subject</label>
                <input type="text" id="pyqSubject" placeholder="e.g., Indian Polity, Economy, Environment">
            </div>
            <div class="form-group">
                <label for="pyqTopic">Topic</label>
                <input type="text" id="pyqTopic" placeholder="e.g., Federalism, MSP, Climate Finance">
            </div>
            <button class="btn-primary" onclick="analyzePyq()">Generate PYQ Analysis</button>
        </div>

        <div class="plan-section" id="pyqLoading" style="display:none;">
            <div class="loading-spinner"></div>
            <p class="text-center">Generating PYQ analysis...</p>
        </div>

        <div class="plan-section" id="pyqOutputSection" style="display:none;">
            <h2>PYQ + Model Answers</h2>
            <div class="plan-content" id="pyqOutput"></div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/pyq-analysis.js}"></script>
</body>
</html>
