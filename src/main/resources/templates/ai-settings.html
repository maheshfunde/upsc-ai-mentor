<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC AI Mentor - AI Settings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar(activeItem='aisettings')}"></div>

    <main class="main-content">
        <div class="page-header">
            <h1>AI Settings</h1>
            <p>Choose a local Ollama model or configure an online provider separately.</p>
        </div>

        <div class="plan-section">
            <h2>Current Mode</h2>
            <p class="analysis-placeholder" id="llmStatusText">
                Current mode: Local Ollama model
            </p>
            <span class="field-hint" id="llmConfigHint"></span>
        </div>

        <div class="plan-section">
            <h2>Local Ollama</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="localModelInput">Local model name</label>
                    <input type="text" id="localModelInput" placeholder="e.g. gemma4:12b-it-qat">
                </div>
            </div>
            <div class="form-nav">
                <button class="btn-primary" onclick="useLocalLlm()">Use Local LLM</button>
            </div>
        </div>

        <div class="plan-section">
            <h2>Online Provider</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="baseUrlInput">Base URL</label>
                    <input type="text" id="baseUrlInput" placeholder="e.g. https://api.openai.com/v1 or https://api.groq.com/openai/v1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="onlineModelInput">Model name (optional)</label>
                    <input type="text" id="onlineModelInput" placeholder="e.g. gpt-4o-mini or llama-3.3-70b-versatile">
                </div>
                <div class="form-group">
                    <label for="apiKeyInput">API key</label>
                    <input type="password" id="apiKeyInput" placeholder="Your API key">
                </div>
            </div>
            <div class="form-nav">
                <button class="btn-primary" onclick="saveOnlineLlmConfig()">Save Online Settings</button>
                <button class="btn-secondary" onclick="clearLlmConfig()">Disable Online</button>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/ai-settings.js(v='20260608-2')}"></script>
</body>
</html>
