server:
  port: 8080

spring:
  application:
    name: upsc-ai-mentor

  # H2 Database Configuration (free, embedded)
  datasource:
    url: jdbc:h2:file:./data/upscmentor
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# AI Configuration
ai:
  ollama:
    base-url: http://localhost:11434
    model-name: llama3:8b
    temperature: 0.7
    timeout: 180
  online:
    default-model: gpt-4o-mini
    openai:
      base-url: https://api.openai.com/v1
    groq:
      base-url: https://api.groq.com/openai/v1
      default-model: llama-3.3-70b-versatile
    temperature: 0.7
    timeout: 180

# UPSC Specific Configuration
upsc:
  max-answer-words: 250
  mains-answer-words: 150
  essay-word-limit: 1200

# RAG / Knowledge Base Configuration
rag:
  enabled: true
  chromadb:
    url: http://localhost:8000
    collection: upsc_knowledge
  embedding:
    model: nomic-embed-text
    provider: ollama
    base-url: ${ai.ollama.base-url}
  chunking:
    size: 1000
    overlap: 200
  retrieval:
    top-k: 15
    final-k: 5
    vector-weight: 0.6
    keyword-weight: 0.4
  upload:
    max-size-mb: 50
    allowed-types: pdf,txt,md,png,jpg,jpeg
    storage-path: ./data/uploads
  ocr:
    enabled: true
    language: eng
